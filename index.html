<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stok Toko Hana</title>
  <style>
    /* FIX v1.3: Ini kunci biar nggak meluber di HP kecil */
    * { box-sizing: border-box; } 

    body { font-family: system-ui, sans-serif; background: #f7f7f7; margin: 0; padding: 12px; } /* Padding dikecilin biar lega */
   .container { max-width: 600px; margin: auto; background: white; padding: 16px; border-radius: 12px; box-shadow: 0 2px 5px #ccc; }
    h1 { text-align: center; color: #333; font-size: 24px; margin: 0 0 16px 0; } /* Font dikecilin dikit */
    h3 { font-size: 16px; margin: 12px 0 8px 0; }

    input, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; } /* Font 16px biar iPhone nggak nge-zoom */
    .form-row { display: flex; gap: 8px; } /* Gap dikecilin */
    .form-row input { flex: 1; min-width: 0; } /* KUNCI 1: min-width 0 biar flex mau nyusut */

    .btn-simpan { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; width: 100%; }
    
    #searchBox { width: 100%; margin-bottom: 12px; }

    /* FIX v1.3: Tabel jadi bisa di-scroll ke samping kalo kepanjangan */
   .table-wrapper { width: 100%; overflow-x: auto; } 
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; min-width: 360px; } /* KUNCI 2: Kasih min-width biar nggak ketekuk */
    th, td { border: 1px solid #ddd; padding: 8px 4px; text-align: center; } /* Padding kanan kiri dikecilin */
    th { background: #f2f2f2; }
    td:nth-child(1) { text-align: left; padding-left: 8px; } /* Nama rata kiri biar gampang baca */

    /* FIX v1.3: Tombol Aksi ditata ulang biar rapi di HP */
   .aksi-group { display: flex; flex-direction: column; gap: 4px; align-items: center; }
   .aksi-row { display: flex; gap: 4px; }
   .btn-aksi { padding: 6px 10px; width: 38px; border: none; color: white; cursor: pointer; border-radius: 6px; font-weight: bold; }
   .btn-kurang { background: #ffc107; color: black; }
   .btn-tambah { background: #17a2b8; }
   .btn-hapus { background: #dc3545; width: 100%; } /* Hapus full 1 baris sendiri */
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 Stok Toko Hana v1.3</h1>

    <h3>Tambah Barang</h3>
    <div class="form-row">
      <input type="text" id="namaBarang" placeholder="Nama Barang">
      <input type="number" id="jumlahStok" placeholder="Stok" inputmode="numeric"> <!-- Placeholder "Stok" aja biar pendek -->
    </div>
    <button class="btn-simpan" onclick="tambahBarang()">Simpan Barang</button>

    <h3>Daftar Stok</h3>
    <input type="text" id="searchBox" placeholder="🔍 Cari nama barang..." onkeyup="tampilkanTabel()">

    <!-- KUNCI 3: Bungkus tabel pake div ini biar bisa scroll samping -->
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Nama</th><th>Stok</th><th>Aksi</th></tr></thead>
        <tbody id="tabelStok"></tbody>
      </table>
    </div>
  </div>

  <script>
    let dataStok = [];
    let kataKunciCari = ''; 

    function muatData() {
      const dataLama = localStorage.getItem('stokTokoHana');
      if (dataLama) { dataStok = JSON.parse(dataLama); }
      tampilkanTabel();
    }

    function simpanData() {
      localStorage.setItem('stokTokoHana', JSON.stringify(dataStok));
    }

    function tambahBarang() {
      const nama = document.getElementById('namaBarang').value.trim();
      const stok = document.getElementById('jumlahStok').value;
      if (nama === '' || stok === '' || stok < 0) { alert('Isi nama & stok dengan benar ya'); return; }
      
      dataStok.push({ id: Date.now(), nama: nama, stok: parseInt(stok) });
      simpanData();
      tampilkanTabel();
      document.getElementById('namaBarang').value = '';
      document.getElementById('jumlahStok').value = '';
    }

    function ubahStok(id, jumlah) {
      const barang = dataStok.find(b => b.id === id);
      if (barang) {
        barang.stok += jumlah;
        if (barang.stok < 0) { barang.stok = 0; }
        simpanData();
        tampilkanTabel();
      }
    }

    function hapusBarang(id) {
      if (confirm('Yakin mau hapus?')) {
        dataStok = dataStok.filter(b => b.id !== id);
        simpanData();
        tampilkanTabel();
      }
    }

    function tampilkanTabel() {
      kataKunciCari = document.getElementById('searchBox').value.toLowerCase(); 
      const tbody = document.getElementById('tabelStok');
      tbody.innerHTML = '';
      
      const dataYangDitampilkan = dataStok.filter(barang => 
        barang.nama.toLowerCase().includes(kataKunciCari)
      );

      if (dataYangDitampilkan.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3">Barang nggak ketemu kawan.</td></tr>';
        return;
      }

      dataYangDitampilkan.forEach(barang => {
        // TOMBOL DIRAPIKAN: -1 +1 sejajar, Hapus di bawahnya
        const row = `<tr>
          <td>${barang.nama}</td>
          <td><b>${barang.stok}</b></td>
          <td>
            <div class="aksi-group">
              <div class="aksi-row">
                <button class="btn-aksi btn-kurang" onclick="ubahStok(${barang.id}, -1)">-1</button>
                <button class="btn-aksi btn-tambah" onclick="ubahStok(${barang.id}, 1)">+1</button>
              </div>
              <button class="btn-aksi btn-hapus" onclick="hapusBarang(${barang.id})">Hapus</button>
            </div>
          </td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    muatData();
  </script>
</body>
</html>
